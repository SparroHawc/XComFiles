  STR_MEDAL_SUPPRESSOR_10: "Suppressor X"
  STR_MEDAL_SUPPRESSOR_NAME: "Suppressor"
  STR_MEDAL_SUPPRESSOR_UFOPEDIA: "Awarded to those agents who best represent the strong arm of the law on its most basic level: pounding evildoers into submission.{NEWLINE}Each odd level increases TUs and Strength by +1. Each even level increases Melee Accuracy and Health by +1."
  STR_MEDAL_TASEMASTER_1: "Tasemaster I"
  STR_MEDAL_TASEMASTER_2: "Tasemaster II"
  STR_MEDAL_TASEMASTER_3: "Tasemaster III"
  STR_MEDAL_TASEMASTER_4: "Tasemaster IV"
