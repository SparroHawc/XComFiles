  STR_MEDAL_TASEMASTER_8: "Tasemaster VIII"
  STR_MEDAL_TASEMASTER_9: "Tasemaster IX"
  STR_MEDAL_TASEMASTER_10: "Tasemaster X"
  STR_MEDAL_TASEMASTER_NAME: "Tasemaster"
  STR_MEDAL_TASEMASTER_UFOPEDIA: "Capturing enemies using cumbersome electric weapons requires finesse and guts.{NEWLINE}Each level increases alternately Firing Accuracy or TUs by +1."
  STR_MEDAL_GRENADIER_1: "Grenadier I"
