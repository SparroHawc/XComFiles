  STR_MEDAL_AQUANAUT_9: "Aquanaut IX"
  STR_MEDAL_AQUANAUT_10: "Aquanaut X"
  STR_MEDAL_AQUANAUT_NAME: "Aquanaut"
  STR_MEDAL_AQUANAUT_UFOPEDIA: "Only the bravest can face horrors of the deep willingly, and only the fittest can survive them.{NEWLINE}+1 morale recovery rate on all odd levels. +10 Bravery on levels II, IV and VIII. +1 night vision range on levels VI and X."
  STR_MEDAL_SPELUNKER_1: "Spelunker I"
  STR_MEDAL_SPELUNKER_2: "Spelunker II"
  STR_MEDAL_SPELUNKER_3: "Spelunker III"
