  STR_MEDAL_SPACER_10: "Spacer X"
  STR_MEDAL_SPACER_NAME: "Spacer"
  STR_MEDAL_SPACER_UFOPEDIA: "Awarded for braving the final frontier. To infinity and beyond!{NEWLINE}Either +1 stun recovery rate or +1 Sanity on all odd levels. +1 Stamina on all even levels. Additionally, +10 Bravery on level I."
  STR_MEDAL_AQUANAUT_1: "Aquanaut I"
  STR_MEDAL_AQUANAUT_2: "Aquanaut II"
  STR_MEDAL_AQUANAUT_3: "Aquanaut III"
