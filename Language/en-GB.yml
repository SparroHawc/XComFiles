en-GB:
  STR_AURA_INSANITY_1_DESCRIPTION: "This place has an eerie aura to it."
  STR_AURA_INSANITY_2_DESCRIPTION: "This place feels oppressive."
  STR_AURA_INSANITY_3_DESCRIPTION: "This place feels nightmarish."
  STR_AURA_INSANITY_4_DESCRIPTION: "Unspeakable horrors dwell here."
  STR_AURA_INSANITY_5_DESCRIPTION: "This place is evil."
  STR_CAREER_COMMONER: "Commoner"
  STR_CAREER_COMMONER_UFOPEDIA: "This person used to be the most ordinary citizen imaginable. By a twist of fate, they found themselves in the middle of a strange conspiracy. Now they are working for us.{NEWLINE}{NEWLINE}+4 Sanity, +2 Morale recovery rate"
  STR_CAREER_MARTIAL_ARTIST: "Martial Artist"
  STR_CAREER_MARTIAL_ARTIST_UFOPEDIA: "For much of their life, this person focused on honing lethal hand-to-hand combat skills. To them, X-Com is the ultimate place to prove themselves.{NEWLINE}{NEWLINE}+4 Melee, +4 Stamina"
  STR_CAREER_SABOTEUR: "Saboteur"
  STR_CAREER_SABOTEUR_UFOPEDIA: "This agent has a detailed history with the art of covert disruption in service of a state or corporation. What they have witnessed there eventually led them to the world of secret organizations. X-Com can use their skills and experience to protect Earth.{NEWLINE}{NEWLINE}+2 Reactions, +1 Night Vision"
  STR_CAREER_RANGER: "Ranger"
  STR_CAREER_RANGER_UFOPEDIA: "This agent comes from a paramilitary force which thoroughly focuses on assaults behind enemy lines. This makes them attracted to forces like X-Com, whose activities fit their profile perfectly - starting with learning of their existence.{NEWLINE}{NEWLINE}+2 Reactions, +2 Firing, +4 Stamina"
  STR_CAREER_SAPPER: "Sapper"
  STR_CAREER_SAPPER_UFOPEDIA: "This person is a certified demolitions expert, either military or civilian. You'd think this doesn't carry a high risk of encountering the supernatural, but you'd be wrong: much of demolition work deals with dismantling shady industrial and military complexes. Once you get used to what you can find there, joining X-Com seems almost like natural progression.{NEWLINE}{NEWLINE}+2 Stun recovery rate, +2 Throwing"
  STR_CAREER_MARINE: "Marine"
  STR_CAREER_MARINE_UFOPEDIA: "A seasoned veteran of elite assault units. Strange experiences from their service eventually led them to our secret initiative.{NEWLINE}{NEWLINE}+3 Firing, +3 Strength"
  STR_CAREER_SPY: "Spy"
  STR_CAREER_SPY_UFOPEDIA: "This person used to work for an intelligence agency. While on duty, they stumbled on secrets not meant for the uninitiated and eventually found their way into the ranks of X-Com.{NEWLINE}{NEWLINE}+2 Reactions, +4 Sanity, +1 Morale recovery rate"
  STR_CAREER_MARKSMAN: "Marksman"
  STR_CAREER_MARKSMAN_UFOPEDIA: "This agent pursued a military career as a sniper. Strange phenomena or a shadow organization encountered in the field enabled them to join our ranks.{NEWLINE}{NEWLINE}+5 Firing"
  STR_CAREER_SOLDIER: "Soldier"
  STR_CAREER_SOLDIER_UFOPEDIA: "As a trained military officer, this person had ample opportunities to encounter secret organizations and other otherworldly threats. This made them a natural candidate for X-Com recruitment.{NEWLINE}{NEWLINE}+2 Firing, +2 Health, +4 Stamina"
  STR_CAREER_POLICE_OFFICER: "Police Officer"
  STR_CAREER_POLICE_OFFICER_UFOPEDIA: "While working on the force, this individual stumbled upon a major secret related to an alien cult, an irregular life form, or somesuch. They couldn't pursue this thread officially, so they agreed to be transferred here.{NEWLINE}{NEWLINE}+3 Firing, +3 Melee"
  STR_CAREER_DETECTIVE: "Detective"
  STR_CAREER_DETECTIVE_UFOPEDIA: "This person's career was to conduct investigations, either as part of a police force or a private company. It is easy to guess how they found their way into our ranks.{NEWLINE}{NEWLINE}+2 Health, +2 Melee, +4 Sanity"
  STR_CAREER_JOURNALIST: "Journalist"
  STR_CAREER_JOURNALIST_UFOPEDIA: "This person spent years on uncovering secrets which governments tried to keep away from the public eye. By joining X-Com, they switched from mere observation to active protection.{NEWLINE}{NEWLINE}+1 Psi Strength, +1 Morale recovery rate, +1 Energy recovery rate"
  STR_CAREER_STUDENT: "Student"
  STR_CAREER_STUDENT_UFOPEDIA: "This agent has an academic background and will never miss a chance to decisively rationalise any strange phenomenon. This doesn't discourage them from pursuing such phenomena, which is how they got here.{NEWLINE}{NEWLINE}+10 Sanity"
  STR_CAREER_SAILOR: "Sailor"
  STR_CAREER_SAILOR_UFOPEDIA: "This agent used to work on a sea vessel. There are strange phenomena out there, some of which may prompt a person to become involved in the supernatural.{NEWLINE}{NEWLINE}+4 Strength, +2 Melee"
  STR_CAREER_MYSTERY_HUNTER: "Mystery Hunter"
  STR_CAREER_MYSTERY_HUNTER_UFOPEDIA: "Exploring ancient ruins, tracking strange animals or hunting ghosts is in their blood. Joining X-Com was a natural choice to formalise this passion into a career.{NEWLINE}{NEWLINE}+10 Bravery"
  STR_CAREER_PILOT: "Pilot"
  STR_CAREER_PILOT_UFOPEDIA: "This person used to operate common aircraft, like commercial airliners, cargo planes or rescue helicopters. Have they encountered a UFO?{NEWLINE}{NEWLINE}+4 Reactions, +2 Firing"
  STR_CAREER_MEDIC: "Medic"
  STR_CAREER_MEDIC_UFOPEDIA: "A medical career makes one see things normal people would easily dismiss as obvious hoaxes. This agent went down this path, eventually joining our ranks.{NEWLINE}{NEWLINE}+8 Sanity, +1 Energy recovery rate"
  STR_CAREER_PSYCHOLOGIST: "Psychologist"
  STR_CAREER_PSYCHOLOGIST_UFOPEDIA: "Mental health workers sometimes stumble upon bits and pieces of secret knowledge, floating at the edge of collective human experience. Becoming a part of X-Com is a path some choose to follow.{NEWLINE}{NEWLINE}+1 Psi Strength, +2 Psi Skill, +1 Health"
  STR_CAREER_FIREMAN: "Fireman"
  STR_CAREER_FIREMAN_UFOPEDIA: "Fire and rescue operations may lead you to strangest of places. When that happens, joining X-Com may seem like a logical choice.{NEWLINE}{NEWLINE}+3 TUs, +2 Throwing, +1 Strength"
  STR_CAREER_EXPLORER: "Explorer"
  STR_CAREER_EXPLORER_UFOPEDIA: "Researching old ruins, native cultures or exotic animals is a high risk job when it comes to unusual phenomena. X-Com is usually happy to invite such experts in their ranks.{NEWLINE}{NEWLINE}+2 TUs, +2 Health, +4 Stamina"
  STR_CAREER_DATA_ANALYST: "Data Analyst"
  STR_CAREER_DATA_ANALYST_UFOPEDIA: "This person used to live a mundane life of processing endless streams of data... Until one day, they noticed a pattern and just couldn't let it go.{NEWLINE}{NEWLINE}+4 Sanity, +2 Psi Strength"
  STR_CAREER_ADEPT: "Adept"
  STR_CAREER_ADEPT_UFOPEDIA: "This person used to explore the boundaries of human consciousness by ways of mysticism, ESP or similar practices. They were successful, which eventually led them to us.{NEWLINE}{NEWLINE}+3 Psi Skill, +1 Health, +1 Sanity"
  STR_CAREER_THIEF: "Thief"
  STR_CAREER_THIEF_UFOPEDIA: "Formerly a criminal, they joined X-Com to put their skills to a better use and perhaps even to find repentance.{NEWLINE}{NEWLINE}+2 TUs, +1 Night Vision"
  STR_CAREER_ILLUSIONIST: "Illusionist"
  STR_CAREER_ILLUSIONIST_UFOPEDIA: "This person used to get through life using their nimble fingers to distract and misdirect others. They believed that all mystery is just smoke and mirrors; they were proven wrong and eventually joined X-Com.{NEWLINE}{NEWLINE}+5 TUs"
  STR_CAREER_DELIVERY_MAN: "Delivery Man"
  STR_CAREER_DELIVERY_MAN_UFOPEDIA: "Contrary to the general perception, making deliveries carries a surprisingly high risk of encountering something a civilian should never see. This person was not dissuaded, and eventually swapped their van for service in X-Com.{NEWLINE}{NEWLINE}+10 Stamina"
  STR_CAREER_MOUNTAINEER: "Mountaineer"
  STR_CAREER_MOUNTAINEER_UFOPEDIA: "This person spent much of their life living a simple life in the highlands, until things got complicated and they joined our ranks.{NEWLINE}{NEWLINE}+5 Health"
  STR_CAREER_DRIVER: "Driver"
  STR_CAREER_DRIVER_UFOPEDIA: "This agent's previous life was transporting goods or people by land. Something they encountered during one of their journeys left such an impact on their psyche that they became drawn to the supernatural, eventually making it to our recruitment lists.{NEWLINE}{NEWLINE}+5 Reactions"
  STR_CAREER_ATHLETE: "Athlete"
  STR_CAREER_ATHLETE_UFOPEDIA: "This person used to have a career in sports, be it football, archery, snooker or HEMA. Once they stumbled upon the global secrecy, they considered it another challenge and joined X-Com.{NEWLINE}{NEWLINE}+5 Throwing"
  STR_CAREER_LABORER: "Labourer"
  STR_CAREER_LABORER_UFOPEDIA: "This person has seen things at their worksite; things even stranger than a sober crane operator... They could have ignored these things, but they chose to dedicate their strength to fight against threats looming over our planet.{NEWLINE}{NEWLINE}+5 Strength"
  STR_CAREER_FENCER: "Fencer"
  STR_CAREER_FENCER_UFOPEDIA: "This person's entire life revolved around studying melee combat, usually for a competitive sport. Their relentless quest to find stronger and more unusual opponents finally led them to uncover a mystery, and eventually join our ranks.{NEWLINE}{NEWLINE}+5 Melee"
  STR_CAREER_MYSTIC: "Mystic"
  STR_CAREER_MYSTIC_UFOPEDIA: "For much of their life, they've had a single aspiration: mental strength. Their rigorous lifestyle allowed them to uncover some parts of the global conspiracy and made them an attractive choice for our recruiters.{NEWLINE}{NEWLINE}+3 Psi Strength, -2 Stamina"
  STR_CAREER_ENGINEER: "Engineer"
  STR_CAREER_ENGINEER_UFOPEDIA: "This person's whole life was working with poorly secured machines. X-Com service cannot be much worse, right?{NEWLINE}{NEWLINE}+1 armor"
  STR_CAREER_ASTRONOMER: "Astronomer"
  STR_CAREER_ASTRONOMER_UFOPEDIA: "The night sky was this person's entire life, until they observed some celestial phenomena which could not be satisfactorily explained by conventional science. They joined X-Com to learn more.{NEWLINE}{NEWLINE}+2 Night Vision, -6 Sanity"
  STR_CAREER_TRADER: "Trader"
  STR_CAREER_TRADER_UFOPEDIA: "Years of hard work on the open market gave this person a keen sense of profit and made them relentless, which allowed them to peek into secrets of this world.{NEWLINE}{NEWLINE}+3 Energy recovery rate, -1 Health"
  STR_CAREER_PUNK: "Punk"
  STR_CAREER_PUNK_UFOPEDIA: "This agent spend much their life negotiating the hard reality of street life. Their unconventional lifestyle was instrumental in exposing them to the unknown, and they are not ones to shy away from conflict, which is why they are here now.{NEWLINE}{NEWLINE}+3 Stun recovery rate, -2 Sanity"
  STR_CAREER_COACH: "Coach"
  STR_CAREER_COACH_UFOPEDIA: "This person's occupation was listening to other people's problems and helping resolve them. But what if said problems are out of this world? This person is more than happy to take this task on! Becoming an X-Com agent is a strange path, but here we are.{NEWLINE}{NEWLINE}+3 Morale recovery rate, -1 Reactions"
  STR_CAREER_FARMER: "Farmer"
  STR_CAREER_FARMER_UFOPEDIA: "This old agent had a farm. All was well until suddenly it wasn't due to aliens, zombies, monsters, or other unusual threats encountered by people living in rural areas. They survived and joined X-Com to show that they won't be messed with.{NEWLINE}{NEWLINE}+4 Stamina, +2 Health, +2 Strength"
  STR_CAREER_HUNTER: "Hunter"
  STR_CAREER_HUNTER_UFOPEDIA: "This person encountered something in the wilderness, a strange phenomena which could not be handwaved as natural. They joined our organization to hunt bigger game than they could ever have imagined.{NEWLINE}{NEWLINE}+3 Firing, +3 Health"
  STR_CAREER_PRIEST: "Priest"
  STR_CAREER_PRIEST_UFOPEDIA: "This agent used to be a man or woman of the cloth, and perhaps still is. After witnessing compelling evidence of something sinister happening in their line of religious duty, they decided to join our ranks to address these threats more directly.{NEWLINE}{NEWLINE}+2 Morale recovery rate, +1 Psi Strength, +2 Sanity"
  STR_CAREER_HISTORIAN: "Historian"
  STR_CAREER_HISTORIAN_UFOPEDIA: "Poring over ancient documents was a gateway for this individual to discover a hidden second layer in our world - one X-Com is part of. They decided to join us to learn more.{NEWLINE}{NEWLINE}+1 Morale recovery rate, +1 Melee, +2 Psi Strength, +6 Sanity, -5 Health"
  STR_CAREER_ENTERTAINER: "Entertainer"
  STR_CAREER_ENTERTAINER_UFOPEDIA: "This agent used to have a position in broadly defined entertainment services as a waiter, musician, courtesan, host, or even a TV celebrity. You wouldn't believe some things one can see in this business, but they did, and were so determined to act upon this knowledge that eventually they joined X-Com.{NEWLINE}{NEWLINE}+1 Morale recovery rate, +1 Energy recovery rate, +1 Stun recovery rate"
  STR_CAREER_NEGOTIATOR: "Negotiator"
  STR_CAREER_NEGOTIATOR_UFOPEDIA: "This person's career relied entirely on their charisma and empathy, most commonly either in business or law enforcement. They joined X-Com due to unusual information they found on duty.{NEWLINE}{NEWLINE}+3 front Armor, +1 Psi Strength"
  STR_CAREER_ASTRONAUT: "Astronaut"
  STR_CAREER_ASTRONAUT_UFOPEDIA: "This person worked with a space agency and perhaps even visited space. They were exposed to some unusual phenomena, and their training makes them useful for the X-Com program.{NEWLINE}{NEWLINE}+2 Health, +2 Reactions, +1 Morale recovery rate"
  STR_CAREER_INSTITUTIONALIZED: "Institutionalized"
  STR_CAREER_INSTITUTIONALIZED_UFOPEDIA: "This person spent most of their life locked in a soft walled room. Now they got the chance to grasp the source of their anguish and strike back at it.{NEWLINE}{NEWLINE}+1 front Armor, +2 Reactions, +2 Psi Skill, -10 Sanity, -1 Morale recovery rate"
  STR_CAREER_MERCENARY: "Mercenary"
  STR_CAREER_MERCENARY_UFOPEDIA: "This agent used to work for whoever paid them to participate in armed conflicts. This gave them an opportunity to see the world as it is: full of mystery and corruption. Joining X-Com was not a major change for them, but we pay well.{NEWLINE}{NEWLINE}+2 Firing, +2 Throwing, +4 Sanity"
  STR_CAREER_BODYGUARD: "Bodyguard"
  STR_CAREER_BODYGUARD_UFOPEDIA: "This person's task was protecting VIPs from any threats. As it turned out, some threats are not what they expected, which is how a shred of the global conspiracy was revealed to them. They eventually joined X-Com to use their skills for a greater cause.{NEWLINE}{NEWLINE}+3 Strength, +3 Reactions"
  STR_CAREER_ARISTOCRAT: "Aristocrat"
  STR_CAREER_ARISTOCRAT_UFOPEDIA: "This agent was born into connections, and spent much of their life rubbing shoulders with the world elites. This allowed them to learn of many things hidden from the public eye. As a person of integrity, they decided to join us to help uphold the world order.{NEWLINE}{NEWLINE}+2 Psi Strength, +2 Melee"
  STR_CAREER_SECRET_AGENT: "Secret Agent"
  STR_CAREER_SECRET_AGENT_UFOPEDIA: "Undisclosed.{NEWLINE}{NEWLINE}+1 TUs, +1 Stamina, +1 Health, +1 Reactions, +1 Firing, +1 Throwing, +1 Strength, +1 Sanity"
  STR_MEDAL_DREAMWALKER_1: "Dreamwalker I"
  STR_MEDAL_DREAMWALKER_2: "Dreamwalker II"
  STR_MEDAL_DREAMWALKER_3: "Dreamwalker III"
  STR_MEDAL_DREAMWALKER_4: "Dreamwalker IV"
