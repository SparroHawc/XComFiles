  STR_MEDAL_SPELUNKER_9: "Spelunker IX"
  STR_MEDAL_SPELUNKER_10: "Spelunker X"
  STR_MEDAL_SPELUNKER_NAME: "Spelunker"
  STR_MEDAL_SPELUNKER_UFOPEDIA: "This agent has remarkable expertise on cave exploring and underground combat.{NEWLINE}+1 energy recovery rate on all odd levels. +1 Stamina on all even levels. Additionally, +1 night vision range on level III."
  STR_MEDAL_INFILTRATOR_1: "Infiltrator I"
  STR_MEDAL_INFILTRATOR_2: "Infiltrator II"
  STR_MEDAL_INFILTRATOR_3: "Infiltrator III"
  STR_MEDAL_INFILTRATOR_4: "Infiltrator IV"
  STR_MEDAL_INFILTRATOR_5: "Infiltrator V"
  STR_MEDAL_INFILTRATOR_6: "Infiltrator VI"
  STR_MEDAL_INFILTRATOR_7: "Infiltrator VII"
  STR_MEDAL_INFILTRATOR_8: "Infiltrator VIII"
  STR_MEDAL_INFILTRATOR_9: "Infiltrator IX"
  STR_MEDAL_INFILTRATOR_10: "Infiltrator X"
  STR_MEDAL_INFILTRATOR_NAME: "Infiltrator"
  STR_MEDAL_INFILTRATOR_UFOPEDIA: "A big gun and heavy armour does not make you a great investigator. This agent knows how to get by with limited equipment.{NEWLINE}+1 Reactions, Melee or morale recovery rate alternately at every level except V. +10 Bravery on level V instead."
  STR_MEDAL_MAULER_1: "Mauler I"
  STR_MEDAL_MAULER_2: "Mauler II"
  STR_MEDAL_MAULER_3: "Mauler III"
  STR_MEDAL_MAULER_4: "Mauler IV"
  STR_MEDAL_MAULER_5: "Mauler V"
  STR_MEDAL_MAULER_6: "Mauler VI"
  STR_MEDAL_MAULER_7: "Mauler VII"
  STR_MEDAL_MAULER_8: "Mauler VIII"
  STR_MEDAL_MAULER_9: "Mauler IX"
  STR_MEDAL_MAULER_10: "Mauler X"
  STR_MEDAL_MAULER_NAME: "Mauler"
  STR_MEDAL_MAULER_UFOPEDIA: "X-Com animals such as dogs are true companions to the agents, but death incarnate to enemies.{NEWLINE}Each level increases Melee and Reactions by +1."
  STR_MEDAL_HUNTER_KILLER_1: "Hunter-Killer I"
  STR_MEDAL_HUNTER_KILLER_2: "Hunter-Killer II"
  STR_MEDAL_HUNTER_KILLER_3: "Hunter-Killer III"
  STR_MEDAL_HUNTER_KILLER_4: "Hunter-Killer IV"
  STR_MEDAL_HUNTER_KILLER_5: "Hunter-Killer V"
